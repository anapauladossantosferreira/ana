<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="atendimento-header">
            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" alt="Atendente" class="avatar">
            <div class="balao-fala">
                <p id="mensagemAtendente">Olá! Preencha seus dados abaixo para começarmos.</p>
            </div>
        </div>

        <h2>Novo Cadastro</h2>
        
        <form id="cadastroForm">
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Ex: Maria Silva">
            </div>

            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="exemplo@email.com">
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" required placeholder="000.000.000-00">
                </div>
                <div class="input-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" required placeholder="(00) 90000-0000">
                </div>
            </div>

            <div class="row">
                <div class="input-group">
                    <label for="idade">Idade</label>
                    <input type="number" id="idade" required min="0">
                </div>
                <div class="input-group">
                    <label for="estadoCivil">Estado Civil</label>
                    <select id="estadoCivil">
                        <option value="solteiro">Solteiro(a)</option>
                        <option value="casado">Casado(a)</option>
                        <option value="divorciado">Divorciado(a)</option>
                        <option value="viuvo">Viúvo(a)</option>
                    </select>
                </div>
            </div>

            <div class="input-group">
                <label for="endereco">Endereço Completo</label>
                <input type="text" id="endereco" required placeholder="Rua, número, bairro e cidade">
            </div>

            <button type="submit" id="btnCadastrar">Finalizar Cadastro</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
