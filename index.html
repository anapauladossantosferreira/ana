<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <section class="form-section">
            <div class="atendimento-header">
                <img src="https://cdn-icons-png.flaticon.com/512/4140/4140037.png" alt="Atendente" class="avatar">
                <div class="balao-fala">
                    <p>Olá! Preencha os dados abaixo e eu os guardarei na lista!</p>
                </div>
            </div>

            <h2>Novo Cliente</h2>
            <form id="cadastroForm">
                <div class="input-group">
                    <label>Nome Completo</label>
                    <input type="text" id="nome" required placeholder="Ex: João Silva">
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>Idade</label>
                        <input type="number" id="idade" required>
                    </div>
                    <div class="input-group">
                        <label>Estado Civil</label>
                        <select id="estadoCivil">
                            <option value="Solteiro(a)">Solteiro(a)</option>
                            <option value="Casado(a)">Casado(a)</option>
                            <option value="Divorciado(a)">Divorciado(a)</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>CPF</label>
                        <input type="text" id="cpf" required placeholder="000.000.000-00">
                    </div>
                    <div class="input-group">
                        <label>Telefone</label>
                        <input type="tel" id="telefone" required placeholder="(00) 00000-0000">
                    </div>
                </div>

                <div class="input-group">
                    <label>Endereço</label>
                    <input type="text" id="endereco" required placeholder="Rua, número, bairro...">
                </div>

                <button type="submit" id="btnSalvar">Salvar Cadastro</button>
            </form>
        </section>

        <section class="list-section">
            <h3>Clientes Cadastrados</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Idade</th>
                            <th>CPF</th>
                            <th>Contato</th>
                            <th>Endereço</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela">
                        </tbody>
                </table>
            </div>
            <button onclick="limparTudo()" class="btn-limpar">Apagar Todos os Registros</button>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
